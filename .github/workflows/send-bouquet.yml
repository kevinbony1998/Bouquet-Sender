name: Send Bouquet

on:
  schedule:
    - cron: '0 12 * * *'   # 8AM EDT (UTC-4)
    - cron: '0 16 * * *'   # 12PM EDT (UTC-4)
    - cron: '0 23 * * *'   # 7PM EDT (UTC-4)
    - cron: '37 15 13 4 *'    # 11:33AM EDT today (April 13)
    - cron: '35 15 13 4 *'    # 11:33AM EDT today (April 13)
    - cron: '33 15 13 4 *'    # 11:33AM EDT today (April 13)
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node bouquet.mjs
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
          SERVER_URL: ${{ secrets.SERVER_URL }}
